<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aura · Glacier — Hourly forecast (v2)</title>
<style>
  :root{ --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; --glacier:#6fb7f2; }
  *{ box-sizing:border-box; }
  body{
    margin:0; padding:30px 18px; font-family:var(--font); color:#eef1f8;
    background:
      radial-gradient(120% 90% at 80% -10%, #20324a 0%, transparent 55%),
      linear-gradient(180deg,#122236 0%,#0b1626 60%,#070e1a 100%);
    min-height:100vh; display:flex; justify-content:center; align-items:flex-start;
  }
  .stage{ width:100%; max-width:540px; }
  .cap{ font:500 11px/1.4 var(--font); letter-spacing:.14em; text-transform:uppercase;
        color:var(--glacier); border-left:3px solid var(--glacier); padding-left:8px; margin:0 0 14px; }

  /* ---- card ---- */
  .hcard{
    background:linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.045));
    border:1px solid rgba(255,255,255,.14); border-radius:18px; padding:17px 16px 14px;
    box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 18px 40px -24px rgba(0,0,0,.6);
  }
  .htop{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:13px; }
  .htitle{ display:flex; align-items:center; gap:8px; font-size:16px; font-weight:500; letter-spacing:.005em; }
  .htitle .dot{ width:7px; height:7px; border-radius:50%; background:var(--glacier); box-shadow:0 0 9px rgba(111,183,242,.8); }
  .htitle .info{ font-size:12px; color:rgba(238,241,248,.4); border:1px solid rgba(238,241,248,.3);
                 width:15px; height:15px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; }

  .seg{ display:inline-flex; gap:3px; padding:3px; border-radius:11px;
        background:rgba(8,17,36,.45); border:1px solid rgba(255,255,255,.1); }
  .seg button{ font-family:inherit; font-size:11.5px; letter-spacing:.01em; padding:6px 11px; border-radius:8px;
               border:none; background:transparent; color:rgba(238,241,248,.65); cursor:pointer; transition:all .18s; white-space:nowrap; }
  .seg button:hover{ color:#eef1f8; }
  .seg button.on{ background:var(--glacier); color:#06223c; font-weight:600; box-shadow:0 2px 10px -2px rgba(111,183,242,.6); }

  /* ---- column heads (time + icon) ---- */
  .row{ display:flex; }
  .cell{ flex:1; min-width:0; text-align:center; }
  .times .cell{ font-size:12px; color:rgba(238,241,248,.62); font-weight:400; }
  .times .cell.now{ color:#eef1f8; font-weight:600; }
  .icons{ margin:7px 0 2px; }
  .icons .cell{ display:flex; justify-content:center; }
  .icons svg{ width:23px; height:23px; display:block; filter:drop-shadow(0 1px 3px rgba(0,0,0,.35)); }

  /* ---- curve area ---- */
  .plot{ position:relative; height:96px; margin-top:2px; }
  .plot svg.curve{ position:absolute; inset:0; width:100%; height:100%; display:block; overflow:visible; }
  .chip{
    position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-size:12.5px; font-weight:600; letter-spacing:.01em;
    padding:2px 7px; border-radius:8px;
    background:rgba(7,14,26,.72); border:1px solid rgba(255,255,255,.12);
    box-shadow:0 4px 12px -4px rgba(0,0,0,.5); backdrop-filter:blur(3px);
    transition:top .5s cubic-bezier(.4,0,.2,1), color .3s;
  }
  .hlede{ font-size:12.5px; color:rgba(238,241,248,.66); font-weight:300; margin:13px 2px 0; }
  @media (prefers-reduced-motion: reduce){ .chip{ transition:none; } }
</style>
</head>
<body>
<div class="stage">
  <div class="cap">Aura · Glacier · hourly forecast — v2</div>

  <!--WIDGET-START-->
  <div class="hcard">
    <div class="htop">
      <div class="htitle"><span class="dot"></span>Hourly forecast<span class="info">i</span></div>
      <div class="seg" id="seg">
        <button data-m="precip" class="on">Precipitation</button>
        <button data-m="temp">Temperature</button>
        <button data-m="wind">Wind</button>
      </div>
    </div>

    <div class="row times" id="times"></div>
    <div class="row icons" id="icons"></div>

    <div class="plot">
      <svg class="curve" id="curve" viewBox="0 0 1000 96" preserveAspectRatio="none" aria-hidden="true"></svg>
      <div id="chips"></div>
    </div>

    <p class="hlede" id="lede">&nbsp;</p>
  </div>
  <!--WIDGET-END-->
</div>

<script>
(function(){
  var TIMES = ["Now","7 PM","8 PM","9 PM","10 PM","11 PM","12 AM","1 AM","2 AM","3 AM"];
  // condition per hour — day/night aware (June, Chicago: sunset ~8:30 PM)
  var COND  = ["suncloud","sun","suncloud","cloud","cloudrain","cloudrain","cloudrain","cloudrain","cloud","mooncloud"];

  var C = { sun:"#f3b765", cloud:"#c3d6f0", cloudDk:"#a9c4e6", rain:"#6fb7f2", moon:"#d8e2f2" };

  // ---- inline SVG icons (no font dependency) ----
  function ICON(kind){
    var sun = '<circle cx="12" cy="12" r="4.3" fill="'+C.sun+'"/>'+
      '<g stroke="'+C.sun+'" stroke-width="1.7" stroke-linecap="round">'+
      '<line x1="12" y1="2.4" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.6"/>'+
      '<line x1="2.4" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.6" y2="12"/>'+
      '<line x1="5.2" y1="5.2" x2="7" y2="7"/><line x1="17" y1="17" x2="18.8" y2="18.8"/>'+
      '<line x1="5.2" y1="18.8" x2="7" y2="17"/><line x1="17" y1="7" x2="18.8" y2="5.2"/></g>';
    var cloud = function(fill,cx,cy,s){ s=s||1; return '<g fill="'+fill+'">'+
      '<ellipse cx="'+cx+'" cy="'+(cy+3*s)+'" rx="'+(8*s)+'" ry="'+(4.2*s)+'"/>'+
      '<circle cx="'+(cx-3*s)+'" cy="'+cy+'" r="'+(3.5*s)+'"/>'+
      '<circle cx="'+(cx+2.5*s)+'" cy="'+(cy-0.5*s)+'" r="'+(4.3*s)+'"/>'+
      '<rect x="'+(cx-8*s)+'" y="'+(cy+1.2*s)+'" width="'+(16*s)+'" height="'+(4.4*s)+'" rx="'+(2.2*s)+'"/></g>'; };
    var rain = '<g stroke="'+C.rain+'" stroke-width="1.9" stroke-linecap="round">'+
      '<line x1="8.8" y1="18" x2="7.8" y2="21"/><line x1="12.4" y1="18" x2="11.4" y2="21.4"/>'+
      '<line x1="16" y1="18" x2="15" y2="21"/></g>';
    var crescent = function(x,y,r){ return '<path d="M'+(x+r)+' '+y+' A'+r+' '+r+' 0 1 1 '+(x-0.2*r)+' '+(y-r*0.95)+
      ' A'+(r*0.78)+' '+(r*0.78)+' 0 0 0 '+(x+r)+' '+y+' Z" fill="'+C.moon+'"/>'; };

    if(kind==="sun")   return wrap(sun);
    if(kind==="cloud") return wrap(cloud(C.cloud,12,10.5,1));
    if(kind==="cloudrain") return wrap(cloud(C.cloudDk,12,9.3,1)+rain);
    if(kind==="moon")  return wrap(crescent(13,11,7));
    if(kind==="suncloud") return wrap(
        '<circle cx="8" cy="8" r="3.1" fill="'+C.sun+'"/>'+
        '<g stroke="'+C.sun+'" stroke-width="1.45" stroke-linecap="round">'+
        '<line x1="8" y1="1.7" x2="8" y2="3.6"/><line x1="1.7" y1="8" x2="3.6" y2="8"/>'+
        '<line x1="3.5" y1="3.5" x2="4.9" y2="4.9"/><line x1="12.5" y1="3.5" x2="11.1" y2="4.9"/></g>'+
        cloud(C.cloud,13,13.6,.92));
    if(kind==="mooncloud") return wrap(
        crescent(16.5,8,4.6)+cloud(C.cloud,11.5,14,.9));
    return wrap(cloud(C.cloud,12,10.5,1));
    function wrap(inner){ return '<svg viewBox="0 0 24 24">'+inner+'</svg>'; }
  }

  var METRICS = {
    precip:{ unit:"%",   color:"#6fb7f2", vals:[24,18,19,23,42,52,54,38,27,30] },
    temp:  { unit:"°",   color:"#f3b765", vals:[72,71,69,66,63,61,60,59,58,58] },
    wind:  { unit:" mph",color:"#79d8c9", vals:[8,9,11,12,14,15,13,11,10,9] }
  };

  var times=document.getElementById("times"),
      icons=document.getElementById("icons"),
      curve=document.getElementById("curve"),
      chips=document.getElementById("chips"),
      lede=document.getElementById("lede");

  times.innerHTML = TIMES.map(function(t,i){
    return '<div class="cell'+(i===0?' now':'')+'">'+t+'</div>'; }).join("");
  icons.innerHTML = COND.map(function(k){
    return '<div class="cell">'+ICON(k)+'</div>'; }).join("");

  var H=96, topPad=18, span=52;

  function render(key){
    var cfg=METRICS[key], vals=cfg.vals, n=vals.length;
    var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals), rng=(max-min)||1;
    var ys = vals.map(function(v){ return topPad + (1-(v-min)/rng)*span; });
    var xs = vals.map(function(_,i){ return (i+0.5)/n*1000; });

    // smooth path through points (quadratic midpoint)
    var core="";
    for(var i=0;i<n-1;i++){
      var xc=((xs[i]+xs[i+1])/2), yc=((ys[i]+ys[i+1])/2);
      core+=" Q"+xs[i].toFixed(1)+","+ys[i].toFixed(1)+" "+xc.toFixed(1)+","+yc.toFixed(1);
    }
    core+=" L"+xs[n-1].toFixed(1)+","+ys[n-1].toFixed(1);
    // extend ends flat to the card edges so the curve + fill go full-bleed
    var strokeD="M0,"+ys[0].toFixed(1)+" L"+xs[0].toFixed(1)+","+ys[0].toFixed(1)+core+" L1000,"+ys[n-1].toFixed(1);
    var fillD  =strokeD+" L1000,"+H+" L0,"+H+" Z";

    var col=cfg.color;
    curve.innerHTML =
      '<defs><linearGradient id="g_'+key+'" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0%" stop-color="'+col+'" stop-opacity="0.42"/>'+
        '<stop offset="48%" stop-color="'+col+'" stop-opacity="0.16"/>'+
        '<stop offset="100%" stop-color="'+col+'" stop-opacity="0"/>'+
      '</linearGradient></defs>'+
      '<path d="'+fillD+'" fill="url(#g_'+key+')"/>'+
      '<path d="'+strokeD+'" fill="none" stroke="'+col+'" stroke-opacity="0.22" stroke-width="6" '+
        'stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>'+
      '<path d="'+strokeD+'" fill="none" stroke="'+col+'" stroke-width="2.6" '+
        'stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>';

    chips.innerHTML = vals.map(function(v,i){
      var label = (key==="wind") ? (v+" mph") : (v+cfg.unit);
      return '<span class="chip" style="left:'+((i+0.5)/n*100).toFixed(2)+'%; top:'+ys[i].toFixed(1)+'px; color:'+col+'">'+label+'</span>';
    }).join("");

    var u=cfg.unit.trim();
    lede.textContent = (key==="precip"?"Precipitation":key==="temp"?"Temperature":"Wind")+
      " · now "+vals[0]+u+" · range "+min+"–"+max+u;
  }

  document.getElementById("seg").addEventListener("click",function(e){
    var b=e.target.closest("button"); if(!b) return;
    this.querySelectorAll("button").forEach(function(x){ x.classList.remove("on"); });
    b.classList.add("on"); render(b.dataset.m);
  });
  render("precip");
})();
</script>
</body>
</html>

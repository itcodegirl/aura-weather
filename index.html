<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1c3f" />
    <!--
      Aura is dark-only by design: cards are frosted surfaces engineered
      to sit on a colourful weather-scene gradient. Half-light support
      (light body, dark cards) read as a UI bug per the design audit.
      "dark only" tells the UA to skip light-mode form-widget and scrollbar
      adaptations rather than mixing the two.
    -->
    <meta name="color-scheme" content="dark only" />
    <meta name="application-name" content="Aura Weather" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Aura Weather" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Aura - Atmospheric Intelligence</title>
    <meta
      name="description"
      content="Aura is a modern weather dashboard with real-time atmospheric data, adaptive visuals, and a polished bento-grid interface built with React and Vite."
    />

    <meta property="og:title" content="Aura - Atmospheric Intelligence" />
    <meta
      property="og:description"
      content="A polished weather dashboard with real-time atmospheric insights, adaptive gradients, and portfolio-ready UI craftsmanship."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aura Weather" />
    <meta property="og:url" content="https://aura-weather-platform.netlify.app/" />
    <!--
      Social crawlers resolve og:image without a base URL, so the image
      reference must be absolute — a relative path renders as a blank
      card on most platforms.
    -->
    <meta
      property="og:image"
      content="https://aura-weather-platform.netlify.app/og-image.png"
    />
    <meta
      property="og:image:alt"
      content="Aura Weather dashboard showing current conditions and the hourly outlook"
    />
    <meta property="og:image:type" content="image/png" />
    <!--
      og-image.png is a 1200x630 dashboard render captured by
      e2e/social-pwa-assets.spec.js (regenerate via `npm run
      screenshots`), so the large-card crop is native, not letterboxed.
    -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aura - Atmospheric Intelligence" />
    <meta
      name="twitter:description"
      content="A polished weather dashboard with real-time atmospheric insights and adaptive visuals."
    />
    <meta
      name="twitter:image"
      content="https://aura-weather-platform.netlify.app/og-image.png"
    />

    <link rel="preconnect" href="https://api.open-meteo.com" crossorigin />
    <link rel="preconnect" href="https://geocoding-api.open-meteo.com" crossorigin />
    <!--
      AQI and NWS alerts are fetched immediately after the first
      forecast response, so a full preconnect (DNS + TCP + TLS) saves a
      round-trip on first load. Archive and reverse-geocode hosts stay
      dns-prefetch only — those calls are deferred or opt-in.
    -->
    <link rel="preconnect" href="https://air-quality-api.open-meteo.com" crossorigin />
    <link rel="preconnect" href="https://api.weather.gov" crossorigin />
    <link rel="dns-prefetch" href="https://archive-api.open-meteo.com" />
    <link rel="dns-prefetch" href="https://api.bigdatacloud.net" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Inter-Variable.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-v20-latin.woff2" crossorigin />
    <style>
      /* Inter — variable (weights 100–900), latin. Primary UI typeface;
         the hero's ultra-thin 84px numeral relies on weight 200 being
         loadable from this single variable face. */
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 100 900; font-display: swap; src: url('/fonts/Inter-Variable.woff2') format('woff2'); }
      /* Manrope — latin (weights 600 700 800) */
      @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/manrope-v20-latin.woff2') format('woff2'); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
      @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/manrope-v20-latin.woff2') format('woff2'); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
      @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/manrope-v20-latin.woff2') format('woff2'); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
      /* Manrope — latin-ext (weights 600 700 800) */
      @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/manrope-v20-latin-ext.woff2') format('woff2'); unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
      @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/manrope-v20-latin-ext.woff2') format('woff2'); unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
      @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 800; font-display: swap; src: url('/fonts/manrope-v20-latin-ext.woff2') format('woff2'); unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
    </style>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width:34rem;margin:18vh auto 0;padding:24px;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#e8eefc;text-align:center;line-height:1.5;">
        <h1 style="font-size:1.4rem;margin:0 0 8px;">Aura Weather needs JavaScript</h1>
        <p style="margin:0;color:#aebbd8;">This dashboard renders live forecast, air-quality, and severe-weather data in the browser. Please enable JavaScript to continue.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
